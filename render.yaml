services:
  - type: web
    name: cafe-app-backend
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/cafe-app-0.0.1-SNAPSHOT.jar --spring.profiles.active=supabase
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: supabase
      - key: PORT
        value: 10000
    healthCheckPath: /api/health

  - type: web
    name: cafe-app-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://cafe-app-backend.onrender.com/api/*