version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/cafe_app
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=password
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_USERNAME=your-email@gmail.com
      - EMAIL_PASSWORD=your-app-password
      - JWT_SECRET=your-secret-key
    depends_on:
      - db
    networks:
      - cafe-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=cafe_app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cafe-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - app
    networks:
      - cafe-network

volumes:
  postgres_data:

networks:
  cafe-network:
    driver: bridge